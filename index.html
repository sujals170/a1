<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford A1 Gujarati Dictionary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;500;700&display=swap');
:root{
  --bg-1:#fff6ea;
  --bg-2:#ffe5c6;
  --bg-3:#d8f0ee;
  --ink:#1c2a37;
  --muted:#5f6a77;
  --card:#ffffffcc;
  --line:#d4dbe3;
  --chip:#f7efe4;
  --chip-active:#1f8a8a;
  --chip-active-ink:#f7fffd;
  --accent:#ef6c2f;
  --shadow:0 12px 34px rgba(13, 43, 54, 0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:'Manrope',sans-serif;
  color:var(--ink);
  
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(135deg,rgba(31,138,138,0.04) 0 2px,rgba(31,138,138,0) 2px 16px);
  opacity:.28;
}
.page{
  position:relative;
  z-index:1;
  max-width:1140px;
  margin:0 auto;
  padding:clamp(20px,3vw,38px) clamp(14px,2.4vw,26px) 34px;
}
.hero{
  margin-bottom:18px;
  padding:clamp(20px,3.4vw,30px);
  border:1px solid var(--line);
  border-radius:24px;
  background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,252,246,.82));
  box-shadow:var(--shadow);
}
.hero-kicker{
  display:inline-block;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  font-weight:700;
  color:#0f6c75;
  background:#dff4f5;
  border:1px solid #b8dbdf;
  padding:4px 10px;
  border-radius:999px;
}
.hero h1{
  margin-top:12px;
  font-family:'Fraunces',serif;
  font-size:clamp(1.55rem,4vw,2.6rem);
  line-height:1.15;
  color:#123347;
}
.hero-copy{
  margin-top:10px;
  max-width:68ch;
  color:var(--muted);
  line-height:1.6;
  font-size:.97rem;
}
.hero-meta{
  margin-top:14px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
.badge{
  display:inline-flex;
  align-items:center;
  border-radius:12px;
  border:1px solid #f2b287;
  background:#fff1e6;
  color:#a44f13;
  font-size:12px;
  font-weight:700;
  padding:5px 10px;
}
#cnt2{
  font-size:13px;
  color:#516375;
  font-weight:600;
}
.panel{
  padding:clamp(14px,2.5vw,22px);
  border-radius:24px;
  background:var(--card);
  border:1px solid var(--line);
  backdrop-filter:blur(8px);
  box-shadow:0 14px 28px rgba(18, 51, 71, 0.08);
}
.searchbar{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:10px;
  margin-bottom:14px;
}
#search{
  width:100%;
  padding:13px 15px;
  font-size:15px;
  border:1px solid #cdd8e3;
  border-radius:14px;
  background:#fff;
  color:var(--ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
  transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease;
}
#search:focus{
  outline:none;
  border-color:#47a5b2;
  box-shadow:0 0 0 4px rgba(71,165,178,.14);
  transform:translateY(-1px);
}
#clearSearch{
  border:1px solid #d3dbe6;
  background:#fff;
  color:#3c4f63;
  font-weight:600;
  font-size:13px;
  border-radius:12px;
  padding:0 14px;
  cursor:pointer;
  transition:background .18s ease,border-color .18s ease,color .18s ease;
}
#clearSearch:hover{
  background:#f2f7ff;
  border-color:#b7c8df;
  color:#153f66;
}
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}
.fbtn{
  border:1px solid #d7dee7;
  background:var(--chip);
  color:#3f5369;
  font-size:12px;
  font-weight:600;
  border-radius:999px;
  padding:7px 12px;
  cursor:pointer;
  transition:transform .2s ease, background .2s ease, border-color .2s ease, color .2s ease;
}
.fbtn:hover{
  transform:translateY(-1px);
  border-color:#b9cad8;
}
.fbtn.active{
  background:var(--chip-active);
  color:var(--chip-active-ink);
  border-color:#146f6f;
}
.cnt{
  margin-bottom:14px;
  color:#526273;
  font-size:13px;
  font-weight:600;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
}
.card{
  position:relative;
  border:1px solid #dbe2eb;
  border-radius:16px;
  padding:14px 14px 13px;
  background:
    linear-gradient(180deg,#ffffff 0%,#fbfcff 100%);
  box-shadow:0 8px 22px rgba(20, 47, 68, 0.06);
  overflow:hidden;
  animation:rise .45s ease both;
  animation-delay:calc(var(--i, 0) * 26ms);
  transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
}
.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  right:0;
  height:4px;
  background:linear-gradient(90deg,#f18b4c,#f2c561,#52a7a7);
}
.card:hover{
  transform:translateY(-3px);
  border-color:#c5d1de;
  box-shadow:0 14px 26px rgba(22, 53, 77, 0.11);
}
.wr{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  margin-bottom:7px;
}
.wrd{
  font-family:'Fraunces',serif;
  font-size:1.15rem;
  line-height:1.22;
  color:#1c2f45;
}
.pos{
  white-space:nowrap;
  font-size:11px;
  font-weight:700;
  color:#51667c;
  border:1px solid #d7e1eb;
  border-radius:8px;
  padding:3px 6px;
  background:#f7fbff;
}
.guj{
  margin-bottom:8px;
  color:#27495f;
  line-height:1.45;
  font-family:'Noto Sans Gujarati','Manrope',sans-serif;
  font-size:14px;
}
.tag{
  display:inline-block;
  margin-right:7px;
  font-size:10px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#0f6c75;
  background:#e1f5f6;
  border:1px solid #c5e6e8;
  border-radius:6px;
  padding:1px 5px;
  vertical-align:middle;
}
.mng{
  font-size:13px;
  color:#44586f;
  margin-bottom:8px;
  line-height:1.52;
}
.ex{
  font-size:12px;
  color:#637285;
  line-height:1.5;
  padding-left:10px;
  border-left:2px solid #e6ecf3;
  font-style:italic;
}
.nr{
  grid-column:1/-1;
  text-align:center;
  padding:38px 14px;
  border:1px dashed #cfdae5;
  border-radius:14px;
  color:#596c7f;
  background:rgba(255,255,255,.66);
  font-size:14px;
}
@keyframes rise{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@media (max-width:740px){
  .hero{border-radius:20px}
  .panel{border-radius:20px}
  .searchbar{grid-template-columns:1fr}
  #clearSearch{padding:10px 14px}
}
</style>
</head>
<body>
<main class="page">
  <header class="hero">
    <p class="hero-kicker">Oxford 3000</p>
    <h1>A1 English-Gujarati Dictionary</h1>
    <p class="hero-copy">Search beginner-friendly vocabulary with quick part-of-speech filters, Gujarati meanings, and short example sentences.</p>
    <div class="hero-meta">
      <span class="badge">A1 Level</span>
      <span id="cnt2"></span>
    </div>
  </header>

  <section class="panel">
    <div class="searchbar">
      <input type="text" id="search" placeholder="Search in English or Gujarati..." autocomplete="off">
      <button id="clearSearch" type="button">Reset</button>
    </div>
    <div class="filters" id="filters"></div>
    <div class="cnt" id="cnt"></div>
    <div class="grid" id="grid"></div>
  </section>
</main>

const posMap={
  'n':'Noun','v':'Verb','adj':'Adjective','adv':'Adverb','prep':'Preposition',
  'pron':'Pronoun','conj':'Conjunction','modal':'Modal','det':'Determiner',
  'exclam':'Exclamation','number':'Number','article':'Article'
};

let activeFilter='All';
const filters=document.getElementById('filters');
const grid=document.getElementById('grid');
const countEl=document.getElementById('cnt');
const search=document.getElementById('search');
const clearSearch=document.getElementById('clearSearch');
const totalEl=document.getElementById('cnt2');

const allBtn=document.createElement('button');
allBtn.className='fbtn active';
allBtn.type='button';
allBtn.textContent='All';
allBtn.onclick=()=>setFilter('All',allBtn);
filters.appendChild(allBtn);

const posSet=new Set();
data.forEach(d=>{
  d.p.replace(/[^a-z]/gi,' ').trim().split(/\s+/).forEach(t=>posSet.add(t.toLowerCase()));
});
const posOrder=['n','v','adj','adv','prep','pron','conj','modal','det','exclam','number','article'];
posOrder.forEach(p=>{
  if(!posSet.has(p))return;
  const btn=document.createElement('button');
  btn.className='fbtn';
  btn.type='button';
  btn.textContent=posMap[p]||p;
  btn.dataset.pos=p;
  btn.onclick=()=>setFilter(p,btn);
  filters.appendChild(btn);
});

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const q=search.value.trim().toLowerCase();
  const filtered=data.filter(d=>{
    const ms=!q||d.w.toLowerCase().includes(q)||d.g.toLowerCase().includes(q)||d.m.toLowerCase().includes(q);
    const mp=activeFilter==='All'||d.p.toLowerCase().includes(activeFilter);
    return ms&&mp;
  });

  const baseCount=filtered.length+' word'+(filtered.length!==1?'s':'')+' found';
  countEl.textContent=activeFilter==='All'?baseCount:baseCount+' in '+activeFilter.toUpperCase();
  totalEl.textContent='Total: '+data.length+' words';

  grid.innerHTML='';
  if(!filtered.length){
    grid.innerHTML='<div class="nr">No words found. Try a different search term.</div>';
    return;
  }

  filtered.forEach((d,i)=>{
    const c=document.createElement('div');
    c.className='card';
    c.style.setProperty('--i',String(i));
    c.innerHTML=`<div class="wr"><span class="wrd">${d.w}</span><span class="pos">${d.p}</span></div><div class="guj"><span class="tag">Gujarati</span>${d.g}</div><div class="mng">${d.m}</div><div class="ex">${d.e}</div>`;
    grid.appendChild(c);
  });
}

search.addEventListener('input',render);
search.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    search.value='';
    render();
  }
});
clearSearch.addEventListener('click',()=>{
  search.value='';
  search.focus();
  render();
});

render();
</script>
